<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
    <title>Netflix</title>
</head>
<body data-profile="Paulo">
  <!-- HEADER -->
  <header class="header">
    <h1 class="logo">NETFLIX</h1>
    <nav>
      <a href="index.html" id="inicio-link">Início</a>
      <a href="#">Séries</a>
      <a href="#">Filmes</a>
    </nav>
  </header>

  <section class="profiles" id="profiles" hidden>
    <h3>Perfis</h3>
    <div class="profiles-list"></div>
  </section>

  <!-- BANNER -->
  <section class="banner">
    <h2>Filme em destaque</h2>
    <button>Assistir</button>
  </section>

  <!-- LISTA DE FILMES -->
  <section class="row">
    <h3>Populares</h3>
    <div class="movies"></div>
  </section>

  <section class="tools">
    <h3>Ferramentas usadas neste projeto</h3>
    <ul class="tools-list">
      <li>HTML5</li>
      <li>CSS3</li>
      <li>JavaScript (Vanilla JS)</li>
      <li>The Movie Database (TMDB) - imagens de filmes</li>
      <li>YouTube - links de trailers</li>
      <li>Random User API - avatares dos perfis</li>
    </ul>
  </section>
  <script src="js/script.js"></script>
</body>
</html>
